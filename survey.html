<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>고객 문진표</title>
<style>
body{font-family:Pretendard;padding:20px;}
input,button{padding:8px;margin:5px;}
</style>
</head>

<body>

<h2>고객 문진표</h2>

<form id="form">
이름: <input name="name"><br>
전화번호: <input name="phone"><br>
방문목적: <input name="purpose"><br>
<button type="submit">상담접수</button>
</form>

<script>
const STORAGE="consult_data";

function getUser(){
  return JSON.parse(sessionStorage.getItem("user"))||{};
}

document.getElementById("form").onsubmit=(e)=>{
  e.preventDefault();

  const f=new FormData(e.target);
  const user=getUser();

  const data=JSON.parse(localStorage.getItem(STORAGE)||"[]");

  data.unshift({
    date:new Date().toLocaleString(),
    staff:user.name||"",
    branch:user.branch||"",
    name:f.get("name"),
    phone:f.get("phone"),
    purpose:f.get("purpose")
  });

  localStorage.setItem(STORAGE,JSON.stringify(data));

  alert("접수 완료");
  e.target.reset();
}
</script>

</body>
</html>
