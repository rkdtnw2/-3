<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>유림텔레콤 현장대응 SOP</title>

<style>
body { margin:0; font-family:Pretendard, sans-serif; background:#f5f7fb; }
header {
  position:fixed; top:0; width:100%; height:60px;
  background:#111; color:#fff; display:flex;
  align-items:center; justify-content:space-between;
  padding:0 20px; z-index:1000;
}
.logo { font-weight:bold; font-size:18px; cursor:pointer; }
.nav button {
  margin-left:10px; padding:6px 12px; border:none;
  background:#fff; border-radius:6px; cursor:pointer;
}
.banner {
  margin-top:60px; height:300px;
  display:flex; flex-direction:column;
  justify-content:center; align-items:center;
  background:linear-gradient(135deg,#111,#444);
  color:#fff;
}
.banner h1 { font-size:36px; margin:10px 0; }

.card-area {
  display:flex; gap:20px; padding:40px;
  justify-content:center; flex-wrap:wrap;
}
.card {
  width:200px; height:120px;
  background:#fff; border-radius:12px;
  display:flex; align-items:center;
  justify-content:center;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<header>
  <div class="logo" onclick="location.reload()">유림텔레콤</div>
  <div class="nav">
    <button onclick="openSurvey()">고객문진표</button>
    <button onclick="openAdmin()">관리자</button>
  </div>
</header>

<div class="banner">
  <div>실전형 신입 교육 포털</div>
  <h1>유림텔레콤 현장대응 SOP</h1>
</div>

<div class="card-area">
  <div class="card">SOP</div>
  <div class="card">상품자료</div>
  <div class="card">테스트</div>
</div>

<script>
function openSurvey(){
  window.open("survey.html","_blank");
}
function openAdmin(){
  const pw = prompt("관리자 비밀번호");
  if(pw==="0728"){
    window.open("admin.html","_blank");
  }else{
    alert("비밀번호 틀림");
  }
}
</script>

</body>
</html>
